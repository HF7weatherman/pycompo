    pr: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/pr_latlon/
    prw: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/prw_latlon/
    hfls: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/hfls_latlon/
    hfss: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/hfss_latlon/
    rlut: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/rlut_latlon/
    cllvi: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/cllvi_latlon/
    clivi: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/clivi_latlon/
    clwvi: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/clwvi_latlon/
    sfc_bf: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/sfc_bf_latlon/
    sfc_rho: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/sfc_rho_latlon/
    sfcwind: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/sfcwind_latlon/
    sfcwind_conv: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/sfcwind_conv_latlon/
    ps: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/ps_latlon/
    ua: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/ua_latlon/
    va: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/va_latlon/
    wa: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/wa_latlon/
    ta: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/ta_latlon/
    hus: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/hus_latlon/
    clw: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/clw_latlon/
    cli: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/cli_latlon/
    pfull: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/pfull_latlon/
    mse_e: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pp/P1D/mse_e_latlon/
  outpath: /work/bm1500/m300738/project_TRR181L4/data/ngc5004_pycompo_analysis
  analysis_time:
    - 2020-03-01T00:00:00Z
    - 2021-03-01T00:00:00Z
  spd: 1
  timelag_idx: 1

# Basic Analysis Settings
lat_range:
  - -15.0
  - 15.0

# Detrending Settings
detrend:
  switch: False
  clim_baseyear: 2020
  clim_avg_days: 30

# Filtering settings
filter:
  lat_mid: 0.0
  cutoff_scale_km: 100.0
  truncation: 1

# SST-Feature Detection Settings
feature:
  type: warm # options: warm, cold
  threshold: 0.15 # in K, negative for cold features, positive for warm features
  connectivity: 8
  min_area: 400.0
  max_ar: 5.
  property_list:
    - centroid
    - axis_major_length
    - axis_minor_length
    - orientation

# Data Cutout Sample Settings
cutout:
  search_RadRatio: 5.0

# Composite Settings
composite:
  type: anomaly # options: anomaly, absolute
  compo_x:
    - -4.0
    - 4.1
    - 0.1
  compo_y:
    - -4.0
    - 4.1
    - 0.1
  rainbelt_subsampling:
    switch: True
    mode: roll_avg
  subgroup_vars:
    - bg_sfcwind: [0., 4., 8., 100.]
    - radius_km: [0., 18., 36., 1000.]
    - ts_ano_detect_mean: [0., 0.175, 0.2, 10.]
    - asprat_idx: [0., 2.5, 5.0, 100.]

# Parallelization
parallel:
  n_jobs_get_features: 32  # Set to 32 for daily data and to 64 for (3-)hourly data. Keep below 64 to allow each worker enough memory.